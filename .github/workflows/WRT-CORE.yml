name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Initialization Values
        run: |
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG.txt)" >> $GITHUB_ENV
          echo "WRT_WIFI=wifi-yes" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          if [ ! -d "defconfig" ]; then
            echo "defconfig directory not found, stopping workflow."
            exit 0
          fi

          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Check Caches
        id: check-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Update Caches
        if: env.WRT_TEST != 'true'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build

            echo "toolchain skiped done!"
          else
            echo "caches missed!"
          fi

          if ${{steps.check-cache.outputs.cache-hit != 'true'}}; then
            CACHE_LIST=$(gh cache list --key "$WRT_CONFIG-$WRT_INFO" | cut -f 1)
            for CACHE_KEY in $CACHE_LIST; do
              gh cache delete $CACHE_KEY
            done

            echo "caches cleanup done!"
          fi

      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh

      - name: Custom Settings
        run: |
          cd ./wrt/

          if [[ "${WRT_CONFIG,,}" == "mt7981-360t7" ]]; then
            if [ ! -f "./defconfig/mt7981-ax3000.config" ]; then
              echo "Upstream defconfig/mt7981-ax3000.config not found."
              exit 1
            fi

            grep -vE '^(CONFIG_TARGET_mediatek(_.*)?=|CONFIG_TARGET_mediatek_filogic_DEVICE_|CONFIG_TARGET_DEVICE_|CONFIG_TARGET_MULTI_PROFILE=|CONFIG_TARGET_PER_DEVICE_ROOTFS=|CONFIG_HAS_SUBTARGETS=)' ./defconfig/mt7981-ax3000.config >> .config
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt >> .config
          elif [[ "${WRT_CONFIG,,}" == *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt >> .config
          else
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          make defconfig -j$(nproc) && make clean -j$(nproc)

      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make download -j$(nproc)

      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          echo "Compile with $(nproc) jobs"
          (
            while true; do
              sleep 60
              echo "build heartbeat: $(date -Is)"
              df -h .
              free -h || true
            done
          ) &
          HEARTBEAT_PID="$!"
          trap 'kill "$HEARTBEAT_PID" 2>/dev/null || true' EXIT

          make -j$(nproc) || make -j1 V=s

      - name: Verify 360T7 Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          if [[ "${WRT_CONFIG,,}" != "mt7981-360t7" ]]; then
            exit 0
          fi

          ROOTFS_DIR=$(find ./staging_dir -maxdepth 2 -type d -name "root-*" | head -n 1)
          if [ -z "$ROOTFS_DIR" ]; then
            echo "Cannot find target rootfs directory under staging_dir."
            exit 1
          fi
          BG_SHA=$(sha256sum "$GITHUB_WORKSPACE/bg1.jpg" | awk '{print $1}')

          check_mode_in_root() {
            local root="$1"
            local path="$2"
            local expected="$3"
            local mode

            if [ ! -e "$root/$path" ]; then
              echo "Missing $path in $root"
              exit 1
            fi

            mode=$(stat -c "%a" "$root/$path")
            if [ "$mode" != "$expected" ]; then
              echo "Bad mode for $path in $root: got $mode, expected $expected"
              exit 1
            fi
            stat -c "%a %n" "$root/$path"
          }

          check_link_in_root() {
            local root="$1"
            local path="$2"
            local expected="$3"
            local target

            if [ ! -L "$root/$path" ]; then
              echo "Missing symlink $path in $root"
              exit 1
            fi

            target=$(readlink "$root/$path")
            if [ "$target" != "$expected" ]; then
              echo "Bad symlink for $path in $root: got $target, expected $expected"
              exit 1
            fi
            echo "$path -> $target"
          }

          check_360t7_root() {
            local root="$1"
            local path
            local actual_bg_sha

            for path in \
              bin/config_generate \
              bin/board_detect \
              bin/ipcalc.sh \
              sbin/ifup \
              sbin/ifdown \
              sbin/devstatus \
              sbin/wifi \
              sbin/mtwifi_cfg \
              lib/wifi/mtwifi.sh \
              lib/netifd/wireless/mtwifi.sh \
              etc/hotplug.d/net/10-mtwifi-detect \
              usr/libexec/login.sh \
              etc/init.d/network \
              etc/init.d/dnsmasq \
              etc/init.d/dropbear \
              etc/init.d/uhttpd \
              etc/init.d/firewall \
              etc/init.d/rpcd \
              etc/rc.common \
              bin/busybox \
              sbin/procd
            do
              check_mode_in_root "$root" "$path" 755
            done

            if [ -e "$root/sbin/l1util" ]; then
              check_mode_in_root "$root" sbin/l1util 755
            else
              echo "Optional sbin/l1util is not selected by the upstream 360T7 defconfig; skipping."
            fi

            check_link_in_root "$root" etc/rc.d/S19dnsmasq ../init.d/dnsmasq
            check_link_in_root "$root" etc/rc.d/S19dropbear ../init.d/dropbear
            check_link_in_root "$root" etc/rc.d/S50uhttpd ../init.d/uhttpd

            awk '
              /qihoo,360t7\)/ { in_case = 1 }
              in_case && /ucidef_set_interfaces_lan_wan "lan1 lan2 lan3" wan/ { ok = 1 }
              in_case && /ucidef_set_interface_lan "lan1 lan2 lan3 wan"/ { bad = 1 }
              in_case && /;;/ { in_case = 0 }
              END { exit((ok && !bad) ? 0 : 1) }
            ' "$root/etc/board.d/02_network" || {
              echo "360T7 network layout is not lan1/lan2/lan3 LAN + wan WAN"
              exit 1
            }

            grep -q "192.168.1.1" "$root/bin/config_generate" || {
              echo "LAN default IP is not 192.168.1.1 in config_generate"
              exit 1
            }

            grep -q "hostname='360T7'" "$root/bin/config_generate" || {
              echo "Default hostname is not 360T7 in config_generate"
              exit 1
            }

            grep -q "set system.@system\\[0\\].hostname='360T7'" "$root/etc/uci-defaults/zz_qihoo_360t7-defaults" || {
              echo "360T7 uci-defaults does not set hostname"
              exit 1
            }

            grep -q "set dhcp.lan.dhcpv4='server'" "$root/etc/uci-defaults/zz_qihoo_360t7-defaults" || {
              echo "360T7 uci-defaults does not force LAN DHCPv4 server"
              exit 1
            }

            grep -q "modprobe mt_wifi" "$root/etc/uci-defaults/zz_qihoo_360t7-defaults" || {
              echo "360T7 uci-defaults does not load MTK WiFi"
              exit 1
            }

            grep -q "/sbin/wifi config" "$root/etc/uci-defaults/zz_qihoo_360t7-defaults" || {
              echo "360T7 uci-defaults does not call upstream WiFi config generator"
              exit 1
            }

            grep -q "0.0.0.0:80" "$root/etc/config/uhttpd" || {
              echo "uhttpd does not listen on 0.0.0.0:80"
              exit 1
            }

            grep -q "0.0.0.0:443" "$root/etc/config/uhttpd" || {
              echo "uhttpd does not listen on 0.0.0.0:443"
              exit 1
            }

            grep -Eq "config dhcp ['\"]?lan['\"]?" "$root/etc/config/dhcp" || {
              echo "Missing LAN DHCP section"
              exit 1
            }

            grep -Eq "option dhcpv4[[:space:]]+['\"]?server['\"]?" "$root/etc/config/dhcp" || {
              echo "LAN DHCPv4 server option is missing"
              exit 1
            }

            grep -Eq "config dhcp ['\"]?wan['\"]?" "$root/etc/config/dhcp" || {
              echo "Missing WAN DHCP section"
              exit 1
            }

            grep -Eq "option ignore[[:space:]]+['\"]?1['\"]?" "$root/etc/config/dhcp" || {
              echo "WAN DHCP ignore option is missing"
              exit 1
            }

            grep -q "^mt_wifi" "$root/etc/modules.d/mt_wifi" || {
              echo "mt_wifi is not configured for module autoload"
              exit 1
            }

            for path in \
              etc/wireless/l1profile.dat \
              etc/wireless/mediatek/mt7981.dbdc.b0.dat \
              etc/wireless/mediatek/mt7981.dbdc.b1.dat \
              www/luci-static/argon/background/bg1.jpg
            do
              [ -s "$root/$path" ] || {
                echo "Missing required file: $path"
                exit 1
              }
              ls -l "$root/$path"
            done

            actual_bg_sha=$(sha256sum "$root/www/luci-static/argon/background/bg1.jpg" | awk '{print $1}')
            if [ "$actual_bg_sha" != "$BG_SHA" ]; then
              echo "Argon bg1.jpg sha256 mismatch: got $actual_bg_sha, expected $BG_SHA"
              exit 1
            fi

            grep -q "option online_wallpaper 'none'" "$root/etc/config/argon" || {
              echo "Argon local wallpaper mode was not applied"
              exit 1
            }
          }

          check_360t7_root "$ROOTFS_DIR"

          MANIFEST=$(find ./bin/targets -type f -name '*qihoo_360t7.manifest' | head -n 1)
          [ -n "$MANIFEST" ] || {
            echo "Missing 360T7 firmware manifest"
            exit 1
          }

          for pkg in \
            dnsmasq-full \
            dropbear \
            uhttpd \
            luci-theme-argon \
            luci-app-argon-config \
            kmod-mediatek_hnat \
            kmod-warp \
            luci-app-turboacc-mtk \
            luci-app-eqos-mtk \
            kmod-mt_wifi \
            mtwifi-cfg \
            wifi-scripts \
            wifi-dats \
            wpad-openssl \
            luci-app-mtwifi-cfg
          do
            grep -q "^${pkg} " "$MANIFEST" || {
              echo "Missing package in manifest: $pkg"
              exit 1
            }
            grep "^${pkg} " "$MANIFEST"
          done

          ROOTFS_IMG=$(find ./build_dir -path './build_dir/host*' -prune -o -type f -name 'root.squashfs' -print | head -n 1)
          [ -n "$ROOTFS_IMG" ] || {
            echo "Cannot find final root.squashfs under build_dir."
            exit 1
          }

          UNSQUASHFS="./staging_dir/host/bin/unsquashfs"
          [ -x "$UNSQUASHFS" ] || UNSQUASHFS="$(command -v unsquashfs || true)"
          [ -n "$UNSQUASHFS" ] || {
            echo "Cannot find unsquashfs."
            exit 1
          }

          SQUASHFS_CHECK="./tmp/360t7-squashfs-check"
          rm -rf "$SQUASHFS_CHECK"
          "$UNSQUASHFS" -q -d "$SQUASHFS_CHECK" "$ROOTFS_IMG"
          check_360t7_root "$SQUASHFS_CHECK"

      - name: Machine Information
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./wrt/ && mkdir ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [[ $WRT_TEST != 'true' ]]; then
            echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \;)" >> $GITHUB_ENV
            echo "WRT_LIST=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^luci-(app|theme)[^ ]*' {} \; | tr '\n' ' ')" >> $GITHUB_ENV

            find ./bin/targets/ -iregex ".*\(buildinfo\|json\|sha256sums\|packages\)$" -exec rm -rf {} +

            for FILE in $(find ./bin/targets/ -type f -iname "*$WRT_TARGET*") ; do
              EXT=$(basename $FILE | cut -d '.' -f 2-)
              NAME=$(basename $FILE | cut -d '.' -f 1 | grep -io "\($WRT_TARGET\).*")
              NEW_FILE="$NAME"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_WIFI"-"$WRT_DATE"."$EXT"
              mv -f $FILE ./upload/$NEW_FILE
            done

            find ./bin/targets/ -type f -exec mv -f {} ./upload/ \;

            make clean -j$(nproc)
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*.*
          body: |
            360T7 weekly production build.
            Source: ${{ env.WRT_REPO }}
            Branch: ${{ env.WRT_BRANCH }}
            Commit: ${{ env.WRT_HASH }}
            Config: ${{ env.WRT_CONFIG }}
            Target: ${{ env.WRT_TARGET }}
            Login: http://${{ env.WRT_IP }}/
            Hostname: 360T7
            WiFi: upstream MTK defaults, generated on first boot
            Kernel: ${{ env.WRT_KVER }}
            LuCI packages: ${{ env.WRT_LIST }}
            Includes: MTK HNAT/WARP, MTK WiFi, Argon static bg1.jpg, LAN DHCP, LuCI, SSH
