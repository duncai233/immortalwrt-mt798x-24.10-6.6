name: CWRT-ALL

on:
  # Weekly production build: Monday 05:00 Asia/Shanghai.
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: 'Extra package config lines, separated by newlines'
        required: false
        type: string
      TEST:
        description: 'Generate config only, do not compile firmware'
        default: false
        required: false
        type: boolean

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions: write-all

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old Releases and Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0

  config:
    needs: cleanup
    name: ${{ matrix.CONFIG }}
    strategy:
      fail-fast: false
      matrix:
        CONFIG: [MT7981-360T7]
        REPO_INFO:
          - { SOURCE: 'Yuzhii0718/immortalwrt-mt798x-6.6-padavanonly', BRANCH: 'openwrt-24.10-6.6' }

    uses: ./.github/workflows/WRT-CORE.yml
    secrets: inherit
    with:
      WRT_CONFIG: ${{ matrix.CONFIG }}
      WRT_THEME: argon
      WRT_NAME: 360T7
      WRT_SSID: ImmortalWrt-2.4G / ImmortalWrt-5G
      WRT_WORD: none
      WRT_IP: 192.168.1.1
      WRT_PW: none
      WRT_REPO: https://github.com/${{ matrix.REPO_INFO.SOURCE }}.git
      WRT_BRANCH: ${{ matrix.REPO_INFO.BRANCH }}
      WRT_SOURCE: ${{ matrix.REPO_INFO.SOURCE }}
      WRT_PACKAGE: ${{ github.event.inputs.PACKAGE || '' }}
      WRT_TEST: ${{ github.event.inputs.TEST || 'false' }}
